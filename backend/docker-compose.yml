version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/coursemanagement
      - JWT_SECRET=your_jwt_secret_here
      - JWT_EXPIRE=30d
    depends_on:
      - mongo
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=coursemanagement
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  uploads:
  logs: